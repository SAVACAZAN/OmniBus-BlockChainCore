name: CI — Build & Test

on:
  push:
    branches:
      - main
      - develop
      - 'feat/**'
      - 'fix/**'
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Setup Zig ────────────────────────────────────────────────────────────
      - name: Setup Zig 0.15.2
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.15.2

      # ── Cache .zig-cache (Zig build artifacts) ──────────────────────────────
      - name: Cache Zig build artifacts
        uses: actions/cache@v3
        with:
          path: .zig-cache
          key: zig-cache-${{ runner.os }}-${{ hashFiles('build.zig', 'core/**/*.zig') }}
          restore-keys: |
            zig-cache-${{ runner.os }}-

      # ── Cache node_modules (frontend deps) ──────────────────────────────────
      - name: Cache Node.js dependencies
        uses: actions/cache@v3
        with:
          path: frontend/node_modules
          key: node-deps-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            node-deps-${{ runner.os }}-

      # ── Setup Node.js ───────────────────────────────────────────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      # ── Build blockchain node (without liboqs on CI) ───────────────────────
      - name: Build omnibus-node (no PQ)
        run: zig build -Doqs=false -Devm=false
        env:
          ZIG_VERBOSE: "0"

      # ── Run core test suite (without liboqs) ────────────────────────────────
      - name: Test — crypto (secp256k1, BIP32, RIPEMD-160)
        run: zig build test-crypto -Doqs=false 2>&1 | tail -50

      - name: Test — blockchain core (consensus, genesis, mempool)
        run: zig build test-chain -Doqs=false 2>&1 | tail -50

      - name: Test — network (P2P, RPC, sync)
        run: zig build test-net -Doqs=false 2>&1 | tail -50

      - name: Test — sharding (sub-blocks, shard config)
        run: zig build test-shard -Doqs=false 2>&1 | tail -50

      - name: Test — storage (binary codec, archive, state trie)
        run: zig build test-storage -Doqs=false 2>&1 | tail -50

      - name: Test — light client & mining pool
        run: zig build test-light -Doqs=false 2>&1 | tail -50

      - name: Test — economic modules (UBI, bread, vault, domain)
        run: zig build test-econ -Doqs=false 2>&1 | tail -50

      # ── Frontend builds & checks ────────────────────────────────────────────
      - name: Frontend — npm install
        working-directory: frontend
        run: npm ci

      - name: Frontend — TypeScript type check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Frontend — build (Vite)
        working-directory: frontend
        run: npm run build

      # ── Inventory scan & commit check ────────────────────────────────────────
      - name: Scan inventory & update STATUS/INVENTORY.json
        run: python tools/inventory-scan.py --json --out STATUS/INVENTORY.json --ci-mode
        continue-on-error: true

      # ── If inventory changed in CI, create a commit (only on main branch) ────
      - name: Commit inventory delta (if changed)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          git config user.name "OmniBus CI"
          git config user.email "ci@omnibus.ai"
          if [ -n "$(git status --porcelain STATUS/INVENTORY.json)" ]; then
            git add STATUS/INVENTORY.json
            git commit -m "chore: auto-update STATUS/INVENTORY.json from CI scan"
            git push
          fi
        continue-on-error: true

      # ── Smoke test: node startup (seed mode) ────────────────────────────────
      - name: Smoke test — node startup (seed mode)
        run: |
          timeout 10 ./zig-out/bin/omnibus-node --mode seed --node-id ci-seed-1 --port 9001 &
          NODE_PID=$!
          sleep 3
          if ps -p $NODE_PID > /dev/null; then
            echo "✓ Node started successfully"
            kill $NODE_PID 2>/dev/null || true
          else
            echo "✗ Node failed to start"
            exit 1
          fi
        continue-on-error: true

      # ── Summary ──────────────────────────────────────────────────────────────
      - name: CI Summary
        if: always()
        run: |
          echo "═══════════════════════════════════════════════════════════"
          echo "CI Build Summary"
          echo "═══════════════════════════════════════════════════════════"
          echo "✓ Zig 0.15.2 compiler"
          echo "✓ omnibus-node (no PQ)"
          echo "✓ Test suites (crypto, chain, net, shard, storage, light, econ)"
          echo "✓ Frontend (npm, tsc, vite build)"
          echo "✓ Inventory scan (STATUS/INVENTORY.json)"
          echo ""
          echo "Binaries: zig-out/bin/omnibus-{node,rpc}"
          echo "Frontend: frontend/dist/"
          echo "═══════════════════════════════════════════════════════════"
