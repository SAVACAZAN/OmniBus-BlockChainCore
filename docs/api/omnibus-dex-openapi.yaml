components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: API-Key
      description: |
        OmniBus exchange API key created via `exchange_createApiKey` (JSON-RPC)
        or `POST /exchange/0/private/AddExport` (REST). Pass `API-Key` header
        for private endpoints. HMAC-SHA512 signing is work-in-progress;
        currently Bearer token auth is also accepted via `Authorization` header.

  schemas:
    KrakenResponse:
      type: object
      properties:
        error:
          type: array
          items: { type: string }
        result: {}
      required: [error, result]

    PaperDisabledError:
      type: object
      properties:
        error:
          type: array
          items:
            type: string
            enum: [PaperTraderDisabled]
        result:
          type: object
      required: [error, result]
      example:
        error: [PaperTraderDisabled]
        result: {}

    Order:
      type: object
      properties:
        order_id: { type: integer, format: uint64 }
        trader: { type: string }
        pair: { type: string }
        side: { type: string, enum: [buy, sell] }
        price: { type: string, description: "Limit price in micro-USD" }
        volume: { type: string, description: "Amount in SAT" }
        filled: { type: string }
        status: { type: string, enum: [active, partial, filled, cancelled] }
        timestamp: { type: integer, format: int64 }

    Fill:
      type: object
      properties:
        fill_id: { type: integer, format: uint64 }
        buy_order_id: { type: integer, format: uint64 }
        sell_order_id: { type: integer, format: uint64 }
        price: { type: string, description: "Execution price in micro-USD" }
        amount: { type: string, description: "Filled amount in SAT" }
        timestamp: { type: integer, format: int64 }
        pair: { type: string }
        buyer: { type: string }
        seller: { type: string }

    Orderbook:
      type: object
      properties:
        pair: { type: string }
        bids:
          type: array
          items:
            type: array
            items: { type: number }
            minItems: 2
            maxItems: 3
        asks:
          type: array
          items:
            type: array
            items: { type: number }
            minItems: 2
            maxItems: 3

    AssetPair:
      type: object
      properties:
        altname: { type: string }
        wsname: { type: string }
        aclass_base: { type: string }
        base: { type: string }
        aclass_quote: { type: string }
        quote: { type: string }
        lot: { type: string }
        pair_decimals: { type: integer }
        lot_decimals: { type: integer }
        lot_multiplier: { type: integer }
        leverage_buy: { type: array, items: { type: integer } }
        leverage_sell: { type: array, items: { type: integer } }
        fees: { type: array, items: { type: array, items: { type: number } } }
        fees_maker: { type: array, items: { type: array, items: { type: number } } }
        fee_volume_currency: { type: string }
        margin_call: { type: integer }
        margin_stop: { type: integer }
        ordermin: { type: string }
        pair_id: { type: integer }
