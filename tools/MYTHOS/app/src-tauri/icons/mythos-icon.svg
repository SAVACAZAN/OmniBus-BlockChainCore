<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1035"/>
      <stop offset="50%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#0a1628"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0.6"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="248" fill="url(#bg)" stroke="url(#accent)" stroke-width="6"/>

  <!-- Outer ring glow -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="url(#glow)" stroke-width="2" stroke-dasharray="12 6"/>

  <!-- Inner hexagon (blockchain) -->
  <polygon points="256,80 400,160 400,320 256,400 112,320 112,160" fill="none" stroke="url(#accent)" stroke-width="4" opacity="0.4"/>

  <!-- M letter stylized -->
  <path d="M 140 340 L 140 180 L 200 260 L 256 180 L 312 260 L 370 180 L 370 340"
        fill="none" stroke="url(#accent)" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Circuit traces (tech feel) -->
  <line x1="140" y1="380" x2="200" y2="380" stroke="#8b5cf6" stroke-width="3" opacity="0.5"/>
  <circle cx="200" cy="380" r="4" fill="#8b5cf6" opacity="0.5"/>
  <line x1="200" y1="380" x2="200" y2="400" stroke="#8b5cf6" stroke-width="3" opacity="0.5"/>

  <line x1="312" y1="380" x2="370" y2="380" stroke="#06b6d4" stroke-width="3" opacity="0.5"/>
  <circle cx="312" cy="380" r="4" fill="#06b6d4" opacity="0.5"/>
  <line x1="312" y1="380" x2="312" y2="400" stroke="#06b6d4" stroke-width="3" opacity="0.5"/>

  <!-- Top dots (data/nodes) -->
  <circle cx="256" cy="70" r="6" fill="#10b981"/>
  <circle cx="180" cy="100" r="4" fill="#8b5cf6" opacity="0.7"/>
  <circle cx="332" cy="100" r="4" fill="#06b6d4" opacity="0.7"/>

  <!-- Score arc (97%) -->
  <path d="M 256 440 A 190 190 0 1 1 252 440" fill="none" stroke="#1f2937" stroke-width="8" stroke-linecap="round"/>
  <path d="M 256 440 A 190 190 0 1 1 270 439" fill="none" stroke="#10b981" stroke-width="8" stroke-linecap="round" stroke-dasharray="1160" stroke-dashoffset="35"/>

  <!-- Bottom text -->
  <text x="256" y="460" text-anchor="middle" fill="#9ca3af" font-family="monospace" font-size="22" font-weight="bold">MYTHOS</text>
</svg>
