<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniBus Ada GUI — Exchange Keys</title>
    <style>
        /* ── OmniBus Dark Theme ─────────────────────────────── */
        :root {
            --bg-dark:    #0d0f1a;
            --bg-panel:   #12141f;
            --bg-card:    #1a1d2e;
            --bg-input:   #1a1d2e;
            --border:     #2a2d44;
            --text:       #e0e0f0;
            --text-dim:   #8888aa;
            --accent:     #7b61ff;
            --accent-hover:#8b71ff;
            --teal:       #00b3a4;
            --teal-hover: #00cdb8;
            --red:        #ff5555;
            --yellow:     #ccaa00;
            --blue:       #0052ff;
            --radius:     6px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', -apple-system, sans-serif;
            background: var(--bg-dark);
            color: var(--text);
            min-height: 100vh;
        }

        /* ── Header ──────────────────────────────────────────── */
        header {
            background: var(--bg-panel);
            border-bottom: 1px solid var(--border);
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            font-size: 18px;
            font-weight: 700;
            color: var(--accent);
        }

        .logo span { color: var(--teal); }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .status-badge {
            font-size: 12px;
            padding: 4px 12px;
            border-radius: 12px;
            font-weight: 600;
        }

        .status-badge.unlocked { background: rgba(0,179,164,0.15); color: var(--teal); }
        .status-badge.locked   { background: rgba(255,85,85,0.15); color: var(--red); }

        .vault-path {
            font-size: 10px;
            color: var(--text-dim);
            font-family: 'Consolas', monospace;
        }

        .btn {
            padding: 6px 16px;
            border: none;
            border-radius: var(--radius);
            font-weight: 600;
            cursor: pointer;
            font-size: 13px;
            transition: background 0.15s;
        }

        .btn-accent  { background: var(--accent); color: #fff; }
        .btn-accent:hover { background: var(--accent-hover); }
        .btn-teal    { background: var(--teal); color: #fff; }
        .btn-teal:hover { background: var(--teal-hover); }
        .btn-red     { background: var(--red); color: #fff; }
        .btn-red:hover { background: #ff7777; }
        .btn-ghost   { background: var(--bg-card); color: var(--text); border: 1px solid var(--border); }
        .btn-ghost:hover { background: var(--border); }

        /* ── Exchange Tabs ───────────────────────────────────── */
        .tabs-container {
            display: flex;
            height: calc(100vh - 56px);
        }

        .tab-sidebar {
            width: 180px;
            background: var(--bg-panel);
            border-right: 1px solid var(--border);
            padding: 16px 0;
        }

        .tab-btn {
            width: 100%;
            padding: 14px 20px;
            background: none;
            border: none;
            color: var(--text-dim);
            font-size: 14px;
            text-align: left;
            cursor: pointer;
            border-left: 3px solid transparent;
            transition: all 0.15s;
        }

        .tab-btn:hover { background: rgba(122,97,255,0.08); color: var(--text); }
        .tab-btn.active { background: rgba(122,97,255,0.12); color: var(--accent); border-left-color: var(--accent); font-weight: 600; }

        .tab-btn .key-count {
            float: right;
            background: var(--bg-card);
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
        }

        /* ── Tab Content ─────────────────────────────────────── */
        .tab-content {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
        }

        .panel { display: none; }
        .panel.active { display: block; }

        .panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .panel-title {
            font-size: 20px;
            font-weight: 700;
        }

        .panel-title .exchange-color { font-weight: 700; }
        .panel-title .exchange-color.lcx { color: var(--teal); }
        .panel-title .exchange-color.kraken { color: var(--accent); }
        .panel-title .exchange-color.coinbase { color: var(--blue); }

        /* ── Keys Table ──────────────────────────────────────── */
        .keys-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 16px;
        }

        .keys-table th {
            text-align: left;
            padding: 10px 12px;
            color: var(--text-dim);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid var(--border);
            background: var(--bg-panel);
        }

        .keys-table td {
            padding: 12px;
            border-bottom: 1px solid var(--border);
            font-size: 13px;
        }

        .keys-table tr:hover td {
            background: rgba(122,97,255,0.05);
        }

        .keys-table .api-key {
            font-family: 'Consolas', monospace;
            color: var(--text-dim);
        }

        .status-pill {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 600;
        }

        .status-pill.paid     { background: rgba(0,179,164,0.15); color: var(--teal); }
        .status-pill.free     { background: rgba(204,170,0,0.15); color: var(--yellow); }
        .status-pill.notpaid  { background: rgba(255,85,85,0.15); color: var(--red); }

        .row-actions {
            display: flex;
            gap: 6px;
        }

        .row-actions button {
            padding: 4px 10px;
            font-size: 11px;
            border-radius: 4px;
            cursor: pointer;
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--text-dim);
            transition: all 0.15s;
        }

        .row-actions button:hover { background: var(--border); color: var(--text); }
        .row-actions button.delete:hover { background: var(--red); color: #fff; border-color: var(--red); }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-dim);
        }

        .empty-state h3 { font-size: 16px; margin-bottom: 8px; color: var(--text); }

        /* ── Modal ───────────────────────────────────────────── */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.show { display: flex; }

        .modal {
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 28px;
            width: 520px;
            max-width: 90vw;
        }

        .modal h2 {
            font-size: 18px;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 14px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            color: var(--text-dim);
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 10px 12px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            font-size: 14px;
            font-family: 'Consolas', monospace;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: var(--accent);
        }

        .form-group select {
            font-family: 'Segoe UI', sans-serif;
        }

        .secret-row {
            display: flex;
            gap: 8px;
        }

        .secret-row input { flex: 1; }

        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
        }

        /* ── SPARK badge ─────────────────────────────────────── */
        .spark-badge {
            font-size: 10px;
            background: rgba(0,179,164,0.1);
            color: var(--teal);
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        /* ── Locked overlay ──────────────────────────────────── */
        .locked-overlay {
            display: none;
            position: absolute;
            inset: 0;
            background: rgba(13,15,26,0.9);
            z-index: 50;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 16px;
        }

        .locked-overlay.show { display: flex; }

        .locked-overlay h2 {
            color: var(--red);
            font-size: 24px;
        }

        .tab-content { position: relative; }
    </style>
</head>
<body>

<!-- ── Header ──────────────────────────────────────────────── -->
<header>
    <div>
        <div class="logo">OmniBus<span>-Ada</span> Exchange Keys</div>
        <div class="vault-path" id="vaultPath">Vault: loading...</div>
    </div>
    <div class="header-right">
        <span class="spark-badge">SPARK VERIFIED</span>
        <span class="status-badge" id="statusBadge">...</span>
        <button class="btn btn-accent" id="lockBtn" onclick="toggleLock()">Lock</button>
    </div>
</header>

<!-- ── Main Layout ─────────────────────────────────────────── -->
<div class="tabs-container">

    <!-- Sidebar tabs -->
    <nav class="tab-sidebar">
        <button class="tab-btn active" onclick="switchTab('lcx')" data-tab="lcx">
            LCX <span class="key-count" id="count-lcx">0</span>
        </button>
        <button class="tab-btn" onclick="switchTab('kraken')" data-tab="kraken">
            Kraken <span class="key-count" id="count-kraken">0</span>
        </button>
        <button class="tab-btn" onclick="switchTab('coinbase')" data-tab="coinbase">
            Coinbase <span class="key-count" id="count-coinbase">0</span>
        </button>
    </nav>

    <!-- Tab content -->
    <div class="tab-content">
        <!-- Locked overlay -->
        <div class="locked-overlay" id="lockedOverlay">
            <h2>Vault Locked</h2>
            <p style="color: var(--text-dim);">Click Unlock to decrypt and load your API keys</p>
            <button class="btn btn-teal" onclick="toggleLock()">Unlock Vault</button>
        </div>

        <!-- LCX Panel -->
        <div class="panel active" id="panel-lcx">
            <div class="panel-header">
                <div class="panel-title"><span class="exchange-color lcx">LCX</span> — API Keys</div>
                <button class="btn btn-teal" onclick="openAddModal('lcx')">+ Add Key</button>
            </div>
            <div id="table-lcx"></div>
        </div>

        <!-- Kraken Panel -->
        <div class="panel" id="panel-kraken">
            <div class="panel-header">
                <div class="panel-title"><span class="exchange-color kraken">Kraken</span> — API Keys</div>
                <button class="btn btn-teal" onclick="openAddModal('kraken')">+ Add Key</button>
            </div>
            <div id="table-kraken"></div>
        </div>

        <!-- Coinbase Panel -->
        <div class="panel" id="panel-coinbase">
            <div class="panel-header">
                <div class="panel-title"><span class="exchange-color coinbase">Coinbase</span> — API Keys</div>
                <button class="btn btn-teal" onclick="openAddModal('coinbase')">+ Add Key</button>
            </div>
            <div id="table-coinbase"></div>
        </div>
    </div>
</div>

<!-- ── Add/Edit Modal ──────────────────────────────────────── -->
<div class="modal-overlay" id="keyModal">
    <div class="modal">
        <h2 id="modalTitle">Add API Key</h2>
        <input type="hidden" id="modalExchange">
        <input type="hidden" id="modalSlot" value="-1">

        <div class="form-group">
            <label>Key Name</label>
            <input type="text" id="keyName" placeholder="e.g. Main Trading Key">
        </div>

        <div class="form-group">
            <label>API Key</label>
            <input type="text" id="apiKey" placeholder="API Key from exchange">
        </div>

        <div class="form-group">
            <label>API Secret</label>
            <div class="secret-row">
                <input type="password" id="apiSecret" placeholder="API Secret from exchange">
                <button class="btn btn-ghost" onclick="toggleSecret()" id="toggleSecretBtn">Show</button>
            </div>
        </div>

        <div class="form-group">
            <label>Status</label>
            <select id="keyStatus">
                <option value="0">Free</option>
                <option value="1">Paid</option>
                <option value="2">Not Paid</option>
            </select>
        </div>

        <div class="modal-actions">
            <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
            <button class="btn btn-accent" onclick="saveKey()">Save</button>
        </div>
    </div>
</div>

<!-- ── JavaScript ──────────────────────────────────────────── -->
<script>
    const API = 'http://localhost:8340/api';
    let currentTab = 'lcx';
    let vaultLoaded = false;

    // ── Tab switching ────────────────────────────────────────
    function switchTab(tab) {
        currentTab = tab;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelector(`[data-tab="${tab}"]`).classList.add('active');
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.getElementById(`panel-${tab}`).classList.add('active');
    }

    // ── API calls ────────────────────────────────────────────
    async function apiCall(endpoint, method = 'GET', body = null) {
        try {
            const opts = { method, headers: { 'Content-Type': 'application/json' } };
            if (body) opts.body = JSON.stringify(body);
            const resp = await fetch(`${API}${endpoint}`, opts);
            return await resp.json();
        } catch (e) {
            console.error('API error:', e);
            return null;
        }
    }

    // ── Load status ──────────────────────────────────────────
    async function loadStatus() {
        const data = await apiCall('/status');
        if (!data) {
            document.getElementById('statusBadge').textContent = 'Offline';
            document.getElementById('statusBadge').className = 'status-badge locked';
            return;
        }

        vaultLoaded = data.loaded;
        document.getElementById('vaultPath').textContent = 'Vault: ' + (data.vaultFile || '?');

        const badge = document.getElementById('statusBadge');
        const lockBtn = document.getElementById('lockBtn');
        const overlay = document.getElementById('lockedOverlay');

        if (vaultLoaded) {
            badge.textContent = 'Unlocked';
            badge.className = 'status-badge unlocked';
            lockBtn.textContent = 'Lock';
            lockBtn.className = 'btn btn-red';
            overlay.classList.remove('show');
        } else {
            badge.textContent = 'Locked';
            badge.className = 'status-badge locked';
            lockBtn.textContent = 'Unlock';
            lockBtn.className = 'btn btn-teal';
            overlay.classList.add('show');
        }

        // Update counts
        if (data.exchanges) {
            for (const [ex, count] of Object.entries(data.exchanges)) {
                const el = document.getElementById(`count-${ex.toLowerCase()}`);
                if (el) el.textContent = count;
            }
        }
    }

    // ── Load keys for exchange ───────────────────────────────
    async function loadKeys(exchange) {
        const data = await apiCall(`/keys/${exchange}`);
        const container = document.getElementById(`table-${exchange}`);

        if (!data || !data.keys || data.keys.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <h3>No API keys</h3>
                    <p>Click "+ Add Key" to add your first ${exchange.toUpperCase()} API key</p>
                </div>`;
            return;
        }

        const statusClass = s => s === 'Paid' ? 'paid' : s === 'Not Paid' ? 'notpaid' : 'free';

        container.innerHTML = `
            <table class="keys-table">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>API Key</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    ${data.keys.map(k => `
                        <tr>
                            <td>${escapeHtml(k.name)}</td>
                            <td class="api-key">${escapeHtml(k.apiKey)}</td>
                            <td><span class="status-pill ${statusClass(k.status)}">${k.status}</span></td>
                            <td>
                                <div class="row-actions">
                                    <button onclick="editKey('${exchange}', ${k.slot})">Edit</button>
                                    <button class="delete" onclick="deleteKey('${exchange}', ${k.slot}, '${escapeHtml(k.name)}')">Delete</button>
                                </div>
                            </td>
                        </tr>
                    `).join('')}
                </tbody>
            </table>
            <div style="color: var(--text-dim); font-size: 12px; margin-top: 8px;">
                ${data.count} / ${data.maxKeys} keys
            </div>`;
    }

    // ── Refresh all ──────────────────────────────────────────
    async function refreshAll() {
        await loadStatus();
        if (vaultLoaded) {
            await Promise.all([loadKeys('lcx'), loadKeys('kraken'), loadKeys('coinbase')]);
        }
    }

    // ── Lock / Unlock ────────────────────────────────────────
    async function toggleLock() {
        if (vaultLoaded) {
            await apiCall('/lock', 'POST');
        } else {
            await apiCall('/unlock', 'POST');
        }
        await refreshAll();
    }

    // ── Modal ────────────────────────────────────────────────
    function openAddModal(exchange) {
        document.getElementById('modalTitle').textContent = `Add ${exchange.toUpperCase()} API Key`;
        document.getElementById('modalExchange').value = exchange;
        document.getElementById('modalSlot').value = '-1';
        document.getElementById('keyName').value = '';
        document.getElementById('apiKey').value = '';
        document.getElementById('apiSecret').value = '';
        document.getElementById('keyStatus').value = '0';
        document.getElementById('apiSecret').type = 'password';
        document.getElementById('toggleSecretBtn').textContent = 'Show';
        document.getElementById('keyModal').classList.add('show');
    }

    async function editKey(exchange, slot) {
        // For edit, we need to fetch the key data
        // The list endpoint masks the key, so we just pre-fill what we have
        const data = await apiCall(`/keys/${exchange}`);
        if (!data) return;

        const key = data.keys.find(k => k.slot === slot);
        if (!key) return;

        document.getElementById('modalTitle').textContent = `Edit ${exchange.toUpperCase()} API Key`;
        document.getElementById('modalExchange').value = exchange;
        document.getElementById('modalSlot').value = slot;
        document.getElementById('keyName').value = key.name;
        document.getElementById('apiKey').value = '';  // Must re-enter (masked)
        document.getElementById('apiSecret').value = '';
        document.getElementById('keyStatus').value =
            key.status === 'Paid' ? '1' : key.status === 'Not Paid' ? '2' : '0';
        document.getElementById('keyModal').classList.add('show');
    }

    function closeModal() {
        document.getElementById('keyModal').classList.remove('show');
    }

    function toggleSecret() {
        const input = document.getElementById('apiSecret');
        const btn = document.getElementById('toggleSecretBtn');
        if (input.type === 'password') {
            input.type = 'text'; btn.textContent = 'Hide';
        } else {
            input.type = 'password'; btn.textContent = 'Show';
        }
    }

    async function saveKey() {
        const exchange = document.getElementById('modalExchange').value;
        const slot = parseInt(document.getElementById('modalSlot').value);
        const body = {
            name:     document.getElementById('keyName').value,
            apiKey:   document.getElementById('apiKey').value,
            secret:   document.getElementById('apiSecret').value,
            status:   parseInt(document.getElementById('keyStatus').value)
        };

        if (!body.name || !body.apiKey) {
            alert('Name and API Key are required.');
            return;
        }

        let result;
        if (slot >= 0) {
            result = await apiCall(`/keys/${exchange}/${slot}`, 'PUT', body);
        } else {
            result = await apiCall(`/keys/${exchange}`, 'POST', body);
        }

        if (result && result.error === 'OK') {
            closeModal();
            await refreshAll();
        } else {
            alert('Error: ' + (result ? result.error : 'Server offline'));
        }
    }

    async function deleteKey(exchange, slot, name) {
        if (!confirm(`Delete key "${name}" from ${exchange.toUpperCase()}?\n\nThis cannot be undone.`)) return;
        const result = await apiCall(`/keys/${exchange}/${slot}`, 'DELETE');
        if (result && result.error === 'OK') {
            await refreshAll();
        } else {
            alert('Error: ' + (result ? result.error : 'Server offline'));
        }
    }

    function escapeHtml(s) {
        return s.replace(/&/g, '&amp;').replace(/</g, '&lt;')
                .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    // ── Init ─────────────────────────────────────────────────
    refreshAll();
    setInterval(loadStatus, 5000);  // Poll status every 5s
</script>

</body>
</html>
