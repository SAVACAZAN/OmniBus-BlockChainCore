<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Hex shape from the original omnibus-icon.svg, restyled with the
       Bitcoin colour palette (#F7931A amber-orange) instead of the
       blue/purple. Keeps: outer hexagon, inner diamond, center dot,
       4 satellite dots at N/S/E/W. Adds a stylized 'O' for OmniBus. -->
  <defs>
    <linearGradient id="omniGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  style="stop-color:#FFB347;stop-opacity:1"/>
      <stop offset="55%" style="stop-color:#F7931A;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#E07B0F;stop-opacity:1"/>
    </linearGradient>
    <radialGradient id="omniShine" cx="35%" cy="30%" r="55%">
      <stop offset="0%"  style="stop-color:#FFE0B0;stop-opacity:0.55"/>
      <stop offset="100%" style="stop-color:#FFE0B0;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Outer hexagon — gradient stroke, transparent fill -->
  <polygon points="32,4 58,18 58,46 32,60 6,46 6,18"
           stroke="url(#omniGrad)" stroke-width="3.5"
           stroke-linejoin="round" fill="none"/>

  <!-- Inner diamond — translucent amber fill (was 0.3 purple in original) -->
  <polygon points="32,14 47,32 32,50 17,32"
           fill="url(#omniGrad)" opacity="0.28"/>

  <!-- Soft top-left highlight inside the diamond -->
  <polygon points="32,14 47,32 32,50 17,32"
           fill="url(#omniShine)"/>

  <!-- Stylized 'O' centered, white, bold like a Bitcoin coin glyph -->
  <text x="32" y="42"
        font-family="Arial Black, Helvetica, sans-serif"
        font-size="22"
        font-weight="900"
        text-anchor="middle"
        fill="#F7931A"
        stroke="#B8650A" stroke-width="0.6">O</text>

  <!-- Center dot — replaced by 'O' above; keep small ring marker -->
  <circle cx="32" cy="32" r="0.8" fill="#FFD180" opacity="0.0"/>

  <!-- 4 decorative satellite dots N/S/E/W (kept from original layout) -->
  <circle cx="32" cy="6"  r="2.2" fill="url(#omniGrad)"/>
  <circle cx="32" cy="58" r="2.2" fill="url(#omniGrad)"/>
  <circle cx="58" cy="32" r="2.2" fill="url(#omniGrad)"/>
  <circle cx="6"  cy="32" r="2.2" fill="url(#omniGrad)"/>
</svg>
